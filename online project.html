<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopHub Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif;}
body{background:#f8f9fa;}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
background:#131921;
color:white;
padding:15px 8%;
}
nav h2{color:#ff9900;}
.search-bar input{
padding:8px 12px;
width:250px;
border-radius:4px;
border:none;
}
.cart{
background:#ff9900;
padding:6px 14px;
border-radius:4px;
font-weight:bold;
cursor:pointer;
}

/* HEADER */
header{
background:#232f3e;
color:white;
text-align:center;
padding:40px 20px;
border-bottom:5px solid #ff9900;
}

/* FILTER */
.filters{
text-align:center;
margin:25px 0;
}
.filters button{
padding:10px 16px;
margin:5px;
border:none;
background:#ff9900;
color:white;
cursor:pointer;
border-radius:6px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:0 8% 50px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{padding:18px;}
.price{color:#b12704;font-size:1.2rem;margin:8px 0;}
.rating{color:orange;margin-bottom:10px;}

.card-content button{
padding:10px 16px;
background:#ff9900;
border:none;
cursor:pointer;
border-radius:6px;
}

/* CART */
.cart-panel{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,0.2);
padding:25px;
overflow:auto;
transform:translateX(100%);
transition:0.3s;
}
.cart-panel.active{transform:translateX(0);}

.cart-item{
margin-bottom:10px;
border-bottom:1px solid #ddd;
padding-bottom:6px;
}

.total{margin-top:20px;font-weight:bold}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
max-width:400px;
}

.modal img{
width:100%;
margin-bottom:15px;
}

/* FOOTER */
footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<nav>
<h2>ShopHub</h2>
<div class="search-bar">
<input type="text" id="search" placeholder="Search..." onkeyup="searchProducts()">
</div>
<div class="cart" onclick="toggleCart()">Cart: <span id="cart-count">0</span></div>
</nav>

<header>
<h1>Online Shopping Store</h1>
<p>Latest deals on electronics & wearables</p>
</header>

<div class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('electronics')">Electronics</button>
<button onclick="filterProducts('wearables')">Wearables</button>
</div>

<section class="products">

<!-- Laptop -->
<div class="card" data-category="electronics">
<img src="https://images.unsplash.com/photo-1593642634315-48f5414c3ad9?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Laptop','899','https://images.unsplash.com/photo-1593642634315-48f5414c3ad9?auto=format&fit=crop&w=800&q=80')">Laptop</h3>
<p class="price">$899</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button onclick="addCart('Laptop',899)">Add to Cart</button>
</div>
</div>

<!-- Smartphone -->
<div class="card" data-category="electronics">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Smartphone','499','https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=80')">Smartphone</h3>
<p class="price">$499</p>
<p class="rating">⭐⭐⭐⭐</p>
<button onclick="addCart('Smartphone',499)">Add to Cart</button>
</div>
</div>

<!-- Smart Watch -->
<div class="card" data-category="wearables">
<img src="https://images.unsplash.com/photo-1600180758895-25b11190f0bb?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Smart Watch','199','https://images.unsplash.com/photo-1600180758895-25b11190f0bb?auto=format&fit=crop&w=800&q=80')">Smart Watch</h3>
<p class="price">$199</p>
<p class="rating">⭐⭐⭐⭐</p>
<button onclick="addCart('Smart Watch',199)">Add to Cart</button>
</div>
</div>

<!-- Headphones -->
<div class="card" data-category="electronics">
<img src="https://images.unsplash.com/photo-1580894908361-6cce9f6e09c2?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Headphones','99','https://images.unsplash.com/photo-1580894908361-6cce9f6e09c2?auto=format&fit=crop&w=800&q=80')">Headphones</h3>
<p class="price">$99</p>
<p class="rating">⭐⭐⭐⭐</p>
<button onclick="addCart('Headphones',99)">Add to Cart</button>
</div>
</div>

<!-- Tablet -->
<div class="card" data-category="electronics">
<img src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Tablet','299','https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=800&q=80')">Tablet</h3>
<p class="price">$299</p>
<p class="rating">⭐⭐⭐⭐</p>
<button onclick="addCart('Tablet',299)">Add to Cart</button>
</div>
</div>

<!-- Fitness Band -->
<div class="card" data-category="wearables">
<img src="https://images.unsplash.com/photo-1575311373937-040b8e1fdc2a?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3 onclick="showDetails('Fitness Band','149','https://images.unsplash.com/photo-1575311373937-040b8e1fdc2a?auto=format&fit=crop&w=800&q=80')">Fitness Band</h3>
<p class="price">$149</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button onclick="addCart('Fitness Band',149)">Add to Cart</button>
</div>
</div>

</section>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
<h3>Shopping Cart</h3>
<div id="cart-items"></div>
<div class="total">Total: $<span id="total">0</span></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modal-img">
<h3 id="modal-title"></h3>
<p id="modal-price"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<footer>
<p>© 2026 ShopHub Store</p>
</footer>

<script>

let cartCount=0;
let total=0;

function addCart(name,price){
cartCount++;
total+=price;

document.getElementById("cart-count").innerText=cartCount;
document.getElementById("total").innerText=total;

let item=document.createElement("div");
item.classList.add("cart-item");
item.innerText=name+" - $"+price;

document.getElementById("cart-items").appendChild(item);
}

function toggleCart(){
document.getElementById("cart-panel").classList.toggle("active");
}

function showDetails(name,price,img){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-title").innerText=name;
document.getElementById("modal-price").innerText="$"+price;
document.getElementById("modal-img").src=img;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let name=card.querySelector("h3").innerText.toLowerCase();
card.style.display=name.includes(input)?"block":"none";
});
}

function filterProducts(category){
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
card.style.display=(category==="all" || card.dataset.category===category)
?"block":"none";
});
}

</script>

</body>
</html>
